<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>

  <meta name="robots" content="noindex,nofollow">

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const asin = params.get("asin");

      // HARD CHECK
      if (!asin || asin.length !== 10) {
        window.location.replace("https://www.amazon.com");
        return;
      }

      // SAFE AMAZON URL (NO EXTRA SLASHES)
      const url = "https://www.amazon.com/dp/" + asin + "?tag=brightlane201-20";

      // DIRECT EXIT (NO INTERMEDIATE ROUTES)
      window.location.replace(url);
    })();
  </script>
</head>

<body>
  <p>Redirecting to product...</p>
</body>
</html>
