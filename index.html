<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrightLane Curated Deals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0b1228, #020617);
  color: #fff;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px 40px;
}

.hero h1 {
  font-size: clamp(2.5rem, 5vw, 3.5rem);
  margin: 0;
}

.hero p {
  opacity: 0.7;
  margin-top: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 22px;
  margin-top: 30px;
}

/* CARD */
.card {
  display: flex;
  flex-direction: column;
  text-decoration: none;
  color: white;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 14px;

  transition: 0.25s ease;
  position: relative;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #4da3ff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* IMAGE */
.img {
  width: 100%;
  height: 210px;
  object-fit: contain;
  background: #0b1228;
  border-radius: 12px;
  padding: 10px;
}

/* BADGE */
.badge {
  position: absolute;
  top: 12px;
  left: 12px;
  font-size: 11px;
  font-weight: 800;

  background: linear-gradient(90deg, #4da3ff, #22d3ee);
  color: #000;

  padding: 5px 10px;
  border-radius: 999px;
}

/* TITLE */
h3 {
  font-size: 0.95rem;
  margin: 10px 0;
  min-height: 42px;
  line-height: 1.35;
}

/* PRICE */
.price {
  font-size: 1.2rem;
  font-weight: 800;
  color: #22d3ee;
  margin-top: auto;
}

/* CTA */
.cta {
  margin-top: 12px;
  text-align: center;
  padding: 10px;

  background: linear-gradient(90deg, #4da3ff, #22d3ee);
  color: #001018;

  font-weight: 800;
  border-radius: 10px;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 60px;
  font-size: 0.8rem;
  opacity: 0.6;
  padding: 20px;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>BrightLane</h1>
    <p>Curated Amazon Deals — Handpicked for You</p>
  </div>

  <div id="grid" class="grid"></div>

  <div class="footer">
    As an Amazon Associate I earn from qualifying purchases.
  </div>

</div>

<script>
async function loadProducts() {
  try {
    const res = await fetch("/api/products");
    const products = await res.json();

    const grid = document.getElementById("grid");

    grid.innerHTML = products.map(p => `
      <a class="card" href="${p.url}" target="_blank" rel="nofollow noopener sponsored">

        <div class="badge">${p.badge || "CURATED"}</div>

        <img class="img"
          src="${p.image}"
          alt="${p.title}"
          loading="lazy"
          onerror="this.src='https://via.placeholder.com/300x300?text=No+Image';"
        />

        <h3>${p.title}</h3>

        <div class="price">${p.price || ""}</div>

        <div class="cta">View on Amazon</div>

      </a>
    `).join("");

  } catch (err) {
    console.error("Failed to load products:", err);
  }
}

loadProducts();
</script>

</body>
</html>
