<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BrightLane Deals</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: #050814;
  color: white;
}

.header {
  text-align: center;
  padding: 30px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px;
  text-decoration: none;
  color: white;
  display: block;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

.title { font-weight: 800; font-size: 18px; }
.price { color: #22d3ee; font-weight: 700; margin-top: 6px; }
.desc { font-size: 13px; opacity: 0.85; margin-top: 10px; }
.tips { font-size: 12px; opacity: 0.75; margin-top: 8px; }

.cta {
  margin-top: 12px;
  display: inline-block;
  background: #22d3ee;
  color: #050814;
  padding: 8px 12px;
  border-radius: 999px;
  font-weight: 800;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🔥 BrightLane Deals</h1>
  <p>Zero-404 affiliate engine (auto-safe links)</p>
</div>

<div id="grid" class="grid"></div>

<script>
const TAG = "brightlane201-20";

/* =========================
   ONLY EDIT THIS SECTION
   ========================= */

const products = [
  {
    asin: "B0933BVK6T",
    title: "Apple AirTag",
    price: "$29",
    desc: "Track keys, bags, luggage instantly.",
    tip: "Attach to frequently lost items."
  },
  {
    asin: "B07THHQMHM",
    title: "Anker Power Bank",
    price: "$25",
    desc: "Fast portable charging for travel.",
    tip: "Fully charge before trips."
  },
  {
    asin: "B09MWCZYBT",
    title: "Dyson V15 Detect",
    price: "$699",
    desc: "Laser vacuum deep cleaning system.",
    tip: "Use laser mode on hard floors."
  },
  {
    asin: "B0861W8R8R",
    title: "Shark Vacuum",
    price: "$299",
    desc: "Cordless powerful cleaning tool.",
    tip: "Clean filter weekly."
  },
  {
    asin: "B09B8V1LZ3",
    title: "Echo Dot",
    price: "$49",
    desc: "Smart home voice assistant.",
    tip: "Connect smart devices."
  },
  {
    asin: "B09SWT1T9G",
    title: "Kindle Paperwhite",
    price: "$139",
    desc: "E-reader for distraction-free reading.",
    tip: "Use warm light mode."
  }
];

/* =========================
   AUTO BUILD (NO ERRORS POSSIBLE)
   ========================= */

const grid = document.getElementById("grid");

grid.innerHTML = products.map(p => {
  const url = `https://www.amazon.com/dp/${p.asin}?tag=${TAG}`;

  return `
    <a class="card" href="${url}" target="_blank" rel="noopener sponsored">
      <div class="title">${p.title}</div>
      <div class="price">${p.price}</div>
      <div class="desc">${p.desc}</div>
      <div class="tips">Tip: ${p.tip}</div>
      <div class="cta">BUY NOW • AMAZON</div>
    </a>
  `;
}).join("");
</script>

</body>
</html>
