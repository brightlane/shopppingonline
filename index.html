<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BrightLane Deals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0f1c;
  --card: #11182b;
  --accent: #4da3ff;
  --accent-glow: rgba(77,163,255,0.4);
  --text: #ffffff;
  --muted: #9aa4b2;
  --border: #1f2a44;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: var(--text);
}

/* Layout */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* Hero */
.hero {
  text-align: center;
  padding: 100px 0 60px;
}

.hero h1 {
  font-size: clamp(2.5rem, 6vw, 4rem);
  font-weight: 700;
  letter-spacing: -1px;
}

.hero p {
  color: var(--muted);
  margin-top: 10px;
}

/* Section */
.section {
  padding: 60px 0;
}

.section-label {
  text-align: center;
  margin-bottom: 40px;
  color: var(--accent);
  letter-spacing: 3px;
  font-size: 0.8rem;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 25px;
}

/* Product Card (FULL CLICKABLE) */
.product-card {
  display: flex;
  flex-direction: column;
  gap: 15px;
  background: linear-gradient(145deg, #0f172a, #020617);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  position: relative;
  transition: 0.35s ease;
}

.product-card:hover {
  transform: translateY(-6px);
  border-color: var(--accent);
  box-shadow: 0 0 40px var(--accent-glow);
}

/* Image */
.product-img {
  width: 100%;
  height: 180px;
  object-fit: contain;
  background: #020617;
  border-radius: 10px;
  padding: 10px;
}

/* Badge */
.badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--accent);
  color: #000;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 5px 8px;
  border-radius: 4px;
}

/* Title */
.product-card h3 {
  font-size: 1rem;
  min-height: 50px;
}

/* Price */
.price {
  font-size: 1.5rem;
  color: var(--accent);
  font-weight: 700;
}

/* CTA */
.cta {
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  background: rgba(77,163,255,0.1);
  border: 1px solid var(--accent);
  font-size: 0.8rem;
  font-weight: 600;
  transition: 0.3s;
}

.product-card:hover .cta {
  background: var(--accent);
  color: #000;
}

/* Responsive */
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">

  <section class="hero">
    <h1>BrightLane</h1>
    <p>Premium Finds • Curated Deals • 2026</p>
  </section>

  <section class="section">
    <div class="section-label">TRENDING NOW</div>
    <div id="grid" class="grid"></div>
  </section>

</div>

<script>
const TAG = "brightlane-20";

/* PRODUCTS */
const products = [
  { title: "Moccamaster KBGV Coffee Maker", asin: "B01N6N2ARX", price: "$359", badge: "BEST SELLER" },
  { title: "Breville Bambino Plus Espresso Machine", asin: "B07GQVY4FR", price: "$499", badge: "TRENDING" },
  { title: "Nespresso Vertuo Plus Coffee System", asin: "B01N6N3A2K", price: "$179", badge: "HOT" },
  { title: "Roborock S8 Pro Ultra Robot Vacuum", asin: "B0BVB6S9CC", price: "$1,599", badge: "PREMIUM" },
  { title: "Anker 737 Power Bank", asin: "B09VPHVT2Z", price: "$149", badge: "FAST CHARGE" },
  { title: "Stanley Quencher H2.0 Tumbler", asin: "B0B61M6Y8C", price: "$45", badge: "VIRAL" }
];

/* BUILD AMAZON LINK */
function amazon(asin) {
  return `https://www.amazon.com/dp/${asin}?tag=${TAG}`;
}

/* RENDER */
function render() {
  const grid = document.getElementById("grid");

  products.forEach(p => {
    const url = amazon(p.asin);

    grid.innerHTML += `
      <a href="${url}" target="_blank" rel="nofollow noopener sponsored" class="product-card">

        <div class="badge">${p.badge}</div>

        <img 
          class="product-img"
          src="https://images-na.ssl-images-amazon.com/images/P/${p.asin}.01.LZZZZZZZ.jpg"
          alt="${p.title}"
        >

        <h3>${p.title}</h3>
        <div class="price">${p.price}</div>

        <div class="cta">View on Amazon →</div>

      </a>
    `;
  });
}

render();
</script>

</body>
</html>
