<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightLane Deals</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0b1228, #020617);
  color: white;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.hero {
  text-align: center;
  padding: 60px 20px 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-top: 30px;
}

.card {
  display: block;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 12px;
  transition: 0.2s ease;
}

.card:hover {
  transform: translateY(-6px);
}

.img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: #0b1228;
  border-radius: 12px;
  padding: 10px;
}

.title {
  font-size: 0.95rem;
  margin-top: 10px;
  min-height: 40px;
}

.price {
  color: #22d3ee;
  font-weight: bold;
  margin-top: 6px;
}

.loading {
  text-align: center;
  opacity: 0.7;
  margin-top: 40px;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>BrightLane Deals</h1>
    <p>Curated Amazon products</p>
  </div>

  <div id="grid" class="grid">
    <div class="loading">Loading products...</div>
  </div>

</div>

<script>
const FALLBACK_IMG = "https://via.placeholder.com/400x400?text=No+Image";

// try ALL possible image sources
function getImage(p) {
  const img =
    p?.image ||
    p?.img ||
    p?.thumbnail ||
    p?.image_url ||
    p?.imageUrl ||
    p?.large_image ||
    p?.medium_image ||
    p?.small_image ||
    "";

  return img || FALLBACK_IMG;
}

// fix broken Amazon image URLs (common issue)
function normalizeAmazonImage(url) {
  if (!url) return FALLBACK_IMG;
  try {
    if (url.includes("m.media-amazon.com")) {
      return url.split("._")[0] + ".jpg";
    }
    return url;
  } catch {
    return FALLBACK_IMG;
  }
}

document.addEventListener("DOMContentLoaded", loadProducts);

async function loadProducts() {
  const grid = document.getElementById("grid");

  try {
    const res = await fetch("/api/products");

    if (!res.ok) throw new Error("API error");

    const data = await res.json();
    const products = Array.isArray(data) ? data : [];

    if (!products.length) {
      grid.innerHTML = "<div class='loading'>No products found</div>";
      return;
    }

    grid.innerHTML = products.map(p => {

      const rawImg = getImage(p);
      const img = normalizeAmazonImage(rawImg);

      return `
        <a class="card" href="${p.url || '#'}" target="_blank" rel="noopener sponsored">

          <img
            class="img"
            src="${img}"
            alt="${p.title || 'product'}"
            loading="lazy"
            onerror="this.onerror=null;this.src='${FALLBACK_IMG}'"
          />

          <div class="title">${p.title || "Untitled product"}</div>

          <div class="price">${p.price || ""}</div>

        </a>
      `;
    }).join("");

  } catch (err) {
    console.error(err);
    grid.innerHTML = "<div class='loading'>Failed to load products</div>";
  }
}
</script>

</body>
</html>
