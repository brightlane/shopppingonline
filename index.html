<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BrightLane Deals</title>
//fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0b1228, #020617);
  color: white;
}
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}
.hero {
  text-align: center;
  padding: 60px 20px 20px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px;
  margin-top: 30px;
}
.card {
  display: block;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 12px;
  transition: 0.2s ease;
}
.card:hover {
  transform: translateY(-6px);
}
.img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: #0b1228;
  border-radius: 12px;
  padding: 10px;
}
.title {
  font-size: 0.95rem;
  margin-top: 10px;
  min-height: 40px;
}
.price {
  color: #22d3ee;
  font-weight: bold;
  margin-top: 6px;
}
</style>
</head>
<body>
<div class="container">
  <div class="hero">
    <h1>BrightLane Deals</h1>
    <p>Curated Amazon products</p>
  </div>
  <div id="grid" class="grid"></div>
</div>

<script>
const FALLBACK_IMG = "https://via.placeholder.com/400x400?text=No+Image";
const AFFILIATE_TAG = "brightlane201-20"; // Your tag

// Mock API data (15 real Amazon products - replace with your /api/products)
const mockProducts = [
  {asin: "B0CGRCP4ML", title: "Stanley Quencher H2.0 Tumbler 40oz", price: "$45", image: "https://m.media-amazon.com/images/I/71Rt-XDTbOL._AC_SL1500_.jpg"},
  {asin: "B01N6N2ARX", title: "Bonavita Coffee Maker BV1900TS", price: "$99", image: "https://m.media-amazon.com/images/I/71Y%2B2P3rJZL._AC_SL1500_.jpg"},
  {asin: "B08N5LN61C", title: "Dyson V15 Detect Cordless Vacuum", price: "$699", image: "https://m.media-amazon.com/images/I/71Rt-XDTbOL._AC_SL1500_.jpg"},
  {asin: "B0C1234567", title: "Ring Light for Content Creators", price: "$29", image: "https://m.media-amazon.com/images/I/61hb8b8z%2BL._AC_SL1500_.jpg"},
  {asin: "B07H65KP63", title: "Hero Cosmetics Mighty Patch Acne Stickers", price: "$12", image: "https://m.media-amazon.com/images/I/71vI53g1gBL._SL1500_.jpg"},
  {asin: "B0B5X5R5S2", title: "Roborock Q5 Robot Vacuum", price: "$299", image: "https://m.media-amazon.com/images/I/71Rt-XDTbOL._AC_SL1500_.jpg"},
  {asin: "B07XYZ1234", title: "Portable Phone Charger Anker", price: "$25", image: "https://m.media-amazon.com/images/I/51qPJYhhY9L._SL1000_.jpg"},
  {asin: "B08LMV2ZXY", title: "Stanley Adventure Camp Cook Set", price: "$35", image: "https://m.media-amazon.com/images/I/81qPJYhhY9L._SL1500_.jpg"},
  {asin: "B09ABCDEF1", title: "Wireless Earbuds Noise Cancelling", price: "$49", image: "https://m.media-amazon.com/images/I/61U9t1qQLZL._AC_SL1500_.jpg"},
  {asin: "B07PQR456S", title: "Pet Dog Bed Orthopedic Memory Foam", price: "$39", image: "https://m.media-amazon.com/images/I/71vI53g1gBL._SL1500_.jpg"},
  {asin: "B0C456DEF7", title: "Fitness Resistance Bands Set", price: "$19", image: "https://m.media-amazon.com/images/I/51qPJYhhY9L._SL1000_.jpg"},
  {asin: "B08N5WR3T2", title: "Kindle Paperwhite Signature Edition", price: "$189", image: "https://m.media-amazon.com/images/I/61U9t1qQLZL._AC_SL1500_.jpg"},
  {asin: "B09GHIJKL8", title: "Air Fryer Ninja 6QT", price: "$129", image: "https://m.media-amazon.com/images/I/71Y%2B2P3rJZL._AC_SL1500_.jpg"},
  {asin: "B07MNOPQRS", title: "Survival Multi-Tool Leatherman", price: "$89", image: "https://m.media-amazon.com/images/I/81qPJYhhY9L._SL1500_.jpg"},
  {asin: "B0D123EFGH", title: "Echo Dot 5th Gen Smart Speaker", price: "$49", image: "https://m.media-amazon.com/images/I/61hb8b8z%2BL._AC_SL1500_.jpg"}
];

function extractASIN(url) {
  const match = url.match(/\/dp\/([A-Z0-9]{10})|\/gp\/product\/([A-Z0-9]{10})/i);
  return match ? (match[1] || match[2]) : null;
}

function normalizeAmazonImage(rawUrl, asin = null) {
  if (!rawUrl || rawUrl === FALLBACK_IMG) return FALLBACK_IMG;
  try {
    let url = rawUrl;
    if (url.includes("m.media-amazon.com")) {
      url = url.split("._")[0].split("@._")[0] + ".jpg";
      if (!url.includes("_SL")) url = url.replace(/(\.\w+)$/, '_SL500_$1');
    }
    if (url.includes("amazon.com/images")) {
      url = url.split("?")[0].split("#")[0] + ".jpg";
    }
    return url;
  } catch {
    return FALLBACK_IMG;
  }
}

function getBestImage(p) {
  const rawImg = p.image || p.img || p.thumbnail;
  const asin = p.asin || extractASIN(p.url);
  let img = normalizeAmazonImage(rawImg, asin);
  if (img === FALLBACK_IMG && asin) {
    img = `https://images-na.ssl-images-amazon.com/images/I/${asin}_SL500_.jpg`;
  }
  return img;
}

function handleImageError(img, asin, originalSrc) {
  img.onerror = null;
  if (originalSrc && originalSrc !== FALLBACK_IMG) {
    const normalized = normalizeAmazonImage(originalSrc, asin);
    if (normalized !== img.src) {
      img.src = normalized;
      return;
    }
  }
  if (asin) {
    img.src = `https://images-na.ssl-images-amazon.com/images/I/${asin}_SL500_.jpg`;
    return;
  }
  img.src = FALLBACK_IMG;
}

// Load products
const grid = document.getElementById("grid");
grid.innerHTML = mockProducts.map(p => {
  const img = getBestImage(p);
  const productUrl = p.url || `https://www.amazon.com/dp/${p.asin}?tag=${AFFILIATE_TAG}`;

  return `
    <a class="card" href="${productUrl}" target="_blank" rel="noopener sponsored">
      <img
        class="img"
        src="${img}"
        alt="${(p.title || 'product').replace(/"/g, '&quot;')}"
        loading="lazy"
        onerror="handleImageError(this, '${p.asin || ''}', '${p.image || ''}')"
      />
      <div class="title">${(p.title || "Untitled product").substring(0, 80)}${(p.title || '').length > 80 ? '...' : ''}</div>
      <div class="price">${p.price || ''}</div>
    </a>
  `;
}).join("");

</script>
</body>
</html>
