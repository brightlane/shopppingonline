name: Daily Feed Update

on:
  schedule:
    # This cron expression runs every day at midnight UTC
    - cron: '0 0 * * *'  # Run at 00:00 UTC every day
  workflow_dispatch:  # Allows you to manually trigger this workflow from GitHub UI

jobs:
  update_feed:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js (if your script is Node.js based)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'  # You can specify your preferred Node.js version

      # Step 3: Install dependencies (if you have a package.json)
      - name: Install dependencies
        run: npm install

      # Step 4: Run the script to update the feed
      - name: Update Feed
        run: node updateFeed.js  # Replace with your script's filename if different

      # Step 5: Commit changes (if required)
      - name: Commit updates
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "Daily feed update"
          git push
