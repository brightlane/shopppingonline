<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Details | Best Deals 2026</title>

  <!-- SEO -->
  <meta name="description" content="Best Amazon deals 2026 - verified products with real reviews and lowest prices." />
  <meta name="robots" content="index, follow" />

  <!-- Google + Bing Verification -->
  <meta name="google-site-verification" content="eWVDN3vbam9nnaZQu7wAQKyfmJJdM7zjI80l4DGeUrQ" />
  <meta name="msvalidate.01" content="574044E39556B8B8DAAF1D1F233C87B0" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial;
      background: #f4f7fb;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    .product-img {
      width: 100%;
      max-height: 400px;
      object-fit: contain;
      border-radius: 12px;
      background: #fff;
    }

    h1 {
      font-size: 26px;
      margin: 15px 0;
    }

    .btn {
      display: block;
      text-align: center;
      background: #ff9900;
      color: black;
      font-weight: bold;
      padding: 15px;
      border-radius: 12px;
      text-decoration: none;
      margin-top: 20px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #ffb84d;
    }

    .meta {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }

    .badge {
      display: inline-block;
      background: #e8f0ff;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <img id="img" class="product-img" src="" alt="Product Image">

    <h1 id="title">Loading product...</h1>

    <div class="badge">Amazon Verified Deal</div>

    <p class="meta">
      This product is selected from top-rated Amazon listings with high buyer satisfaction.
    </p>

    <a id="buyBtn" class="btn" href="#" target="_blank">
      🛒 Buy on Amazon
    </a>

    <p class="meta" id="asinText"></p>

  </div>
</div>

<script src="config.js"></script>

<script>
  // Read URL params
  const params = new URLSearchParams(window.location.search);

  const asin = params.get("asin");
  const title = params.get("title") || "Best Amazon Product";
  const img = params.get("img") || "";

  // Set content
  document.getElementById("title").innerText = title;

  if (img) {
    document.getElementById("img").src = img;
  } else {
    document.getElementById("img").style.display = "none";
  }

  // FIXED AMAZON LINK (NO 404 EVER)
  const amazonURL = window.amazonLink(asin);

  document.getElementById("buyBtn").href = amazonURL;
  document.getElementById("asinText").innerText = "ASIN: " + asin;

  // tracking
  document.getElementById("buyBtn").addEventListener("click", function () {
    window.trackClick(asin, title);
  });
</script>

</body>
</html>
