<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Product Review | Best Deal 2026</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f6fb;
      color: #111;
    }

    header {
      background: #111827;
      color: white;
      padding: 40px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    img {
      width: 100%;
      border-radius: 12px;
    }

    .buy-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 14px 18px;
      background: #f59e0b;
      color: black;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
    }

    .buy-btn:hover {
      background: #fbbf24;
    }

    .price {
      font-size: 20px;
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1 id="title">Top Product Review</h1>
  <p>Best Amazon deal analysis 2026</p>
</header>

<div class="container">

  <div class="card">
    <img id="image" src="" alt="Product Image">

    <h2 id="name">Product Name</h2>

    <div class="price" id="price">Loading price...</div>

    <p id="desc">
      This is one of the best-rated products based on performance, value, and customer reviews.
    </p>

    <a id="buyLink" class="buy-btn" href="#" target="_blank" rel="nofollow sponsored">
      🛒 View on Amazon
    </a>
  </div>

</div>

<script src="config.js"></script>

<script>
  // GET DATA FROM URL
  const params = new URLSearchParams(window.location.search);

  const asin = params.get("asin");
  const name = params.get("name") || "Best Product";
  const img = params.get("img") || "https://via.placeholder.com/600x400";
  const price = params.get("price") || "Check Amazon";

  // SET CONTENT
  document.getElementById("name").innerText = name;
  document.getElementById("image").src = img;
  document.getElementById("price").innerText = "Price: " + price;

  // AMAZON LINK (SAFE BUILDER)
  if (window.amazonLink && asin) {
    document.getElementById("buyLink").href = window.amazonLink(asin);
  }
</script>

</body>
</html>
