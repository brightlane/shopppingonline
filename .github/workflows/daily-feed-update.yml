name: Daily Feed Update

on:
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v2

    # Step 2: Set up Node.js (use the correct version of Node.js)
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        cd /path/to/your/repository/scripts  # Change this to your script directory
        npm install  # Installs the dependencies, including axios

    # Step 4: Run the feeder update script
    - name: Run feeder update script
      run: |
        cd /path/to/your/repository/scripts  # Change this to your script directory
        node feeder-update.js  # Run the actual script that updates the feed
