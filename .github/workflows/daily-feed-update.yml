name: Daily Feed Update

on:
  # Trigger on a daily schedule
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC
  # Trigger manually via GitHub UI
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest  # This is the runner environment

    steps:
    # Step 1: Checkout the repository
    - name: Checkout repository
      uses: actions/checkout@v2

    # Step 2: Set up Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'  # Specify Node.js version

    # Step 3: Install dependencies (including axios)
    - name: Install dependencies
      run: |
        cd /path/to/your/repository/scripts  # Update to correct folder if needed
        npm install  # Installs dependencies including axios

    # Step 4: Run the feeder update script
    - name: Run feeder update script
      run: |
        cd /path/to/your/repository/scripts  # Update to correct folder if needed
        node feeder-update.js  # Run your main script
