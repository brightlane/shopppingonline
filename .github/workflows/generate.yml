name: Generate Product Pages

on:
  workflow_dispatch:  # ← RUN BUTTON MAGIC
  push:
    branches: [ main ]
    paths:
      - 'generate.js'
      - 'products-*.json'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Generate SEO pages
      run: node generate.js
    
    - name: Commit & Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git checkout -- .
        git clean -fd
        git add *.html sitemap.xml robots.txt index.html
        git commit -m "🤖 Generate $(find . -name '*.html' | wc -l) SEO pages [skip ci]" || exit 0
        git push origin HEAD:main
