- name: Commit & Push
  run: |
    git config --local user.email "action@github.com"
    git config --local user.name "GitHub Action"
    
    # Pull latest (no clean - keeps existing pages!)
    git pull origin main || true
    
    # Generate new pages (overwrites old ones)
    node generate.js
    
    # Add ONLY new/modified files
    git add *.html sitemap.xml robots.txt index.html || true
    
    # Commit ONLY if changes
    git diff --staged --quiet || git commit -m "🤖 Regenerate $(ls *.html 2>/dev/null | wc -l | xargs) SEO pages"
    
    git push origin HEAD:main || true
