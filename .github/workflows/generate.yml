name: Auto Generate Affiliate Pages

on:
  push:
    branches:
      - main

  schedule:
    - cron: "0 3 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run generator
        run: npm run generate

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto-bot@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated pages" || echo "No changes"
          git push
