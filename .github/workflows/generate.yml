name: Generate Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run generator
        run: node generate.js

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto-bot@users.noreply.github.com"
          git add .
          git commit -m "auto generate" || echo "no changes"
          git push
