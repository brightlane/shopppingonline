name: HARD DEBUG GENERATION

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show full repo structure
        run: |
          echo "===== ROOT FILES ====="
          ls -la
          echo "===== FULL TREE ====="
          find .

      - name: Verify generator exists
        run: |
          if [ -f generate.js ]; then echo "generate.js FOUND"; else echo "MISSING generate.js"; exit 1; fi

      - name: Verify product data exists
        run: |
          if [ -f products-data.json ]; then echo "products-data.json FOUND"; else echo "MISSING products-data.json"; exit 1; fi

      - name: Show product data
        run: cat products-data.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run generator (FORCED LOGGING)
        run: |
          echo "STARTING GENERATION"
          node generate.js
          echo "GENERATION FINISHED"

      - name: Show output files
        run: |
          echo "===== GENERATED FILES ====="
          ls -la
          echo "===== BEST FILES ====="
          find . -name "best-*.html"

      - name: Commit results
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto-bot@users.noreply.github.com"
          git add .
          git commit -m "auto generate debug build" || echo "no changes"
          git push
