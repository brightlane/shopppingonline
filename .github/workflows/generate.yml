- name: Commit & Push generated files
  run: |
    git config --local user.email "action@github.com"
    git config --local user.name "GitHub Action"
    
    # CLEAN SLATE - discard any unstaged changes
    git checkout -- .
    git clean -fd
    
    # Pull latest changes
    git pull origin main --rebase || true
    
    # Add ONLY generated HTML files
    git add *.html index.html sitemap.xml robots.txt
    
    # Commit if changes exist
    git commit -m "🤖 Generate $(ls *.html | wc -l) SEO pages [skip ci]" || exit 0
    
    # Force push generated files
    git push origin HEAD:main --force
