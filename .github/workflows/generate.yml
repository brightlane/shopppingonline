name: Generate Pages (DEBUG MODE)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Show repo files (DEBUG)
        run: ls -R

      - name: Check JSON exists
        run: cat products-data.json

      - name: Run generator (DEBUG)
        run: node generate.js

      - name: Done
        run: echo "BUILD COMPLETE"
