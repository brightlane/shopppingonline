name: Generate Site

on:
  workflow_dispatch:  # Enables "Run workflow" button
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm install  # If you have package.json; else skip
    - run: node your-script.js  # Rename your JS file, e.g., generate.js
    - name: Commit generated files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.html
        git commit -m "Generate product pages" || exit 0
        git push
