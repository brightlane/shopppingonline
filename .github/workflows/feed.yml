name: Daily Feed System

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  run-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run unified runner
        run: node runner.js
