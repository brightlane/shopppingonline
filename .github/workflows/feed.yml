name: Daily Amazon SEO Generator

on:
  schedule:
    - cron: '0 0 * * *'   # runs daily at midnight UTC
  workflow_dispatch:       # manual run button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    # 1. Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run feeder (API → data if you use it)
    - name: Run feeder
      run: node feeder.js

    # 5. Build Amazon SEO pages
    - name: Build product pages
      run: node generator/build-amazon-pages.js

    # 6. Build sitemap
    - name: Build sitemap
      run: node generator/build-sitemap.js

    # 7. Commit and push changes
    - name: Commit changes
      run: |
        git config user.name "seo-bot"
        git config user.email "seo-bot@example.com"

        git add .

        # prevent empty commits
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "auto: update amazon SEO pages + sitemap"
        git push
