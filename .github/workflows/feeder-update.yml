name: Feeder Update

on:
  # Automatically run once a day at midnight UTC
  schedule:
    - cron: '0 0 * * *'  # Every day at midnight UTC

  # Manually trigger the workflow via a button
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update_feeder:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js (if your feeder script uses Node.js)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'  # Specify the Node.js version you're using

      # Step 3: Install dependencies (if any, using npm)
      - name: Install dependencies
        run: npm install  # Only run this if you have a package.json and dependencies

      # Step 4: Run the feeder update script (replace with your actual script)
      - name: Run Feeder Update
        run: node feeder-update.js  # Update this to your actual script name

      # Step 5: Commit and push changes to the repository (if you want to push the updates back)
      - name: Commit and push feeder updates
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "Daily feeder update"
          git push
        # This step will only run if your script modifies files like 'feeder.json' or 'index.html'
