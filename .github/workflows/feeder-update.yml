const axios = require('axios');
const fs = require('fs');
const path = require('path');

// Replace this with your actual Skyscanner or affiliate feed URL
const FEED_URL = 'https://convert.ctypy.com/aff_c?offer_id=29465&aff_id=21885'; 
const OUTPUT_FILE = path.join(__dirname, 'data/feed.json');

async function updateFeed() {
    console.log('📡 Fetching latest affiliate data...');

    try {
        const response = await axios.get(FEED_URL, {
            timeout: 10000, // 10 second timeout
            headers: { 'User-Agent': 'Vulture-10K-Engine/1.0' }
        });

        // Ensure the data directory exists
        const dir = path.dirname(OUTPUT_FILE);
        if (!fs.existsSync(dir)) {
            fs.mkdirSync(dir, { recursive: true });
        }

        // Save the raw or processed data
        fs.writeFileSync(OUTPUT_FILE, JSON.stringify(response.data, null, 2));
        
        console.log(`✅ Success! Feed saved to ${OUTPUT_FILE}`);
    } catch (error) {
        console.error('❌ Error updating feed:');
        if (error.response) {
            // Server responded with a status code outside the 2xx range
            console.error(`Status: ${error.response.status}`);
        } else if (error.request) {
            // Request was made but no response was received
            console.error('No response received from the server.');
        } else {
            // Something else went wrong
            console.error(error.message);
        }
        process.exit(1); // Exit with error for GitHub Actions to catch
    }
}

updateFeed();
