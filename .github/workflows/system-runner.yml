name: Build System

on:
  push:
  workflow_dispatch:

jobs:
  build-system:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 STEP 1 — FORCE BUILD OUTPUT
      - name: Generate Build
        run: node build.js

      # 🔥 STEP 2 — VERIFY OUTPUT
      - name: Verify dist/index.html exists
        run: |
          if [ -f dist/index.html ]; then
            echo "✅ Build OK"
          else
            echo "❌ Build failed - no index.html found"
            exit 1
          fi
