<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Best Coffee Makers 2026</title>

  <!-- UI SYSTEM -->
  <link rel="stylesheet" href="ui-core.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>☕ Best Coffee Makers 2026</h1>
  <p>Top-rated coffee machines tested for performance, value, and durability.</p>

  <div id="product-grid" class="grid"></div>

</div>

<!-- SYSTEM FILES -->
<script src="affiliate-config.js"></script>
<script src="product-renderer.js"></script>

<script>
async function loadProducts() {
  try {
    const res = await fetch("products-coffee.json");
    const products = await res.json();

    renderProducts("product-grid", products);

  } catch (err) {
    console.error("Failed to load products:", err);
  }
}

loadProducts();
</script>

</body>
</html>
